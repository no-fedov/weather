<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Viewer – Sign Up</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
<main>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-6">
                <div class="weather-logo"></div>
            </div>
        </div>

        <h2 class="text-center mb-5">Sign Up</h2>

        <div class="row justify-content-center">
            <div class="col-12 col-lg-4 col-md-6 col-sm-12">
                <form th:action="@{/sign-up}" method="POST" class="mb-3">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input class="form-control"
                               type="text"
                               required
                               name="login">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input class="form-control"
                               type="password"
                               required
                               name="password">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Repeat password</label>
                        <input type="password"
                               class="form-control"
                               required
                               name="repeatedPassword">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mt-3">Sign Up</button>
                    <p class="mt-2 text-center">Already have an account? <a href="/sign-in">Sign in here</a></p>
                </form>
            </div>
        </div>
    </div>
</main>
<script src="/js/bootstrap.bundle.min.js"></script>
</body>

</html>

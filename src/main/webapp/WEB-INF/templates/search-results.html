<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Homepage</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<section id="page-content">
    <div class="container mt-4">
        <div th:replace="~{fragments/search-location-form :: search-location-form}"></div>

        <div>
            <h2>Locations:</h2>
            <div class="row">
                <div th:each="location : ${locations}" class="col-12 col-lg-3 col-md-6 mb-4">
                    <div class="card h-100">
                        <div th:object="${location}" class="card-body d-flex flex-column">
                            <h5 th:text="*{name}" class="card-title">San Francisco</h5>
                            <p th:text="|Latitude: *{latitude}" class="card-text mb-1">Latitude: 37.7790262</p>
                            <p th:text="|Longitude: *{longitude}" class="card-text mb-1">Longitude:
                                -122.419906</p>
                            <p th:text="|Country: *{country}" class="card-text mb-1">Country: US</p>
                            <p th:text="|State: *{state}" class="card-text mb-3">State: California</p>
                            <form th:action="@{/location}" method="POST">
                                <input type="hidden" name="_method" th:value="*{isAdded} ? 'delete' : 'post'">
                                <input type="hidden" name="name" th:value="*{name}">
                                <input type="hidden" name="latitude" th:value="*{latitude}">
                                <input type="hidden" name="longitude" th:value="*{longitude}">
                                <input type="hidden" name="cityName" th:value="${cityName}">
                                <div class="mt-auto">
                                    <button th:text="*{isAdded} ? 'Delete' : 'Add'" class="btn btn-primary w-100">Add</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Weather Viewer – Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-6">
            <div class="weather-logo"></div>
        </div>
    </div>

    <h2 class="text-center mb-5">Sign Up</h2>

    <div th:if="${global_exception} != null" class="row justify-content-center">
        <div class="col-12 col-lg-4 col-md-6 col-sm-12">
            <div th:text="${global_exception}" class="alert alert-danger" role="alert">
                Passwords don't match.
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-12 col-lg-4 col-md-6 col-sm-12">
            <form th:action="@{/sign-up}" method="POST" class="mb-3">
                <div class="mb-3">
                    <label for="login" class="form-label">Username</label>
                    <div class="input-group has-validation">
                        <input type="text"
                               class="form-control"
                               id="login"
                               name="login"
                               required
                               th:classappend="${login_exception}? 'is-invalid' : ''"
                        />
                        <div class="invalid-feedback" th:text="${login_exception}">
                            Account with this email already exists.
                        </div>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group has-validation">
                        <input type="password"
                               class="form-control"
                               id="password"
                               name="password"
                               required
                               th:classappend="${password_exception}? 'is-invalid' : ''"
                        />
                        <div class="invalid-feedback" th:text="${password_exception}">
                            Password must be at least 4 characters long.
                        </div>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="repeatedPassword" class="form-label">Repeat password</label>
                    <input type="password"
                           class="form-control"
                           id="repeatedPassword"
                           name="repeatedPassword"
                           required value=""/>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-3">Sign Up</button>
                <p class="mt-2 text-center">Already have an account? <a href="/sign-in">Sign in here</a></p>
            </form>
        </div>
    </div>
</div>

</body>
</html>
